name: Packer

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-packer@v3

      - name: Validate Packer template
        run: |
          packer init packer/devops-sandbox.pkr.hcl
          packer validate packer/devops-sandbox.pkr.hcl
